name: ${COMPOSE_PROJECT_NAME:-mvp_qcp}

services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qcp-backend-dev:latest
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    working_dir: /app/backend
    environment:
      ENV: dev
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      DATABASE_URL: sqlite:///./data/qcp.db
      REDIS_URL: redis://redis:6379/0
      WATCHFILES_FORCE_POLLING: "true"
      CORS_ALLOW_ORIGINS: http://127.0.0.1:${FRONTEND_PORT:-5173},http://localhost:${FRONTEND_PORT:-5173}
    volumes:
      - ./backend:/app/backend
      - sqlite-data:/app/backend/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qcp-backend-dev:latest
    command: python -m app.worker.rq_worker
    working_dir: /app/backend
    environment:
      ENV: dev
      DATABASE_URL: sqlite:///./data/qcp.db
      REDIS_URL: redis://redis:6379/0
      EXECUTION_BACKEND: docker
      EXECUTION_IMAGE: qcp-backend-dev:latest
      EXECUTION_RUNNER_MODULE: app.services.execution.runner
      EXECUTION_READ_ONLY_ROOTFS: "true"
      EXECUTION_NETWORK_DISABLED: "true"
      EXECUTION_MEM_LIMIT_MB: "256"
      EXECUTION_CPU_LIMIT: "0.5"
      EXECUTION_PIDS_LIMIT: "64"
      EXECUTION_TMPFS_SIZE_MB: "64"
    volumes:
      - ./backend:/app/backend
      - sqlite-data:/app/backend/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: >-
      sh -c 'LOCK_HASH=$$(sha256sum package-lock.json | cut -d " " -f1); STORED_HASH=$$(cat node_modules/.package-lock.sha256 2>/dev/null || true); if [ "$$LOCK_HASH" != "$$STORED_HASH" ]; then npm ci && echo "$$LOCK_HASH" > node_modules/.package-lock.sha256; fi; npm run dev'
    working_dir: /app/frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:${BACKEND_PORT:-8000}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  sqlite-data:
  frontend-node-modules:
