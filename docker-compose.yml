services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qcp-backend-dev:latest
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    working_dir: /app/backend
    environment:
      ENV: dev
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      DATABASE_URL: sqlite:///./data/qcp.db
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_NAME: qcp-default
      TASK_JOB_TIMEOUT_SECONDS: "90"
      EXECUTION_BACKEND: remote
      EXECUTION_SERVICE_URL: http://execution-service:8010
      EXECUTION_SERVICE_TIMEOUT_SECONDS: "10"
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app/backend
      - sqlite-data:/app/backend/data
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      execution-service:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qcp-backend-dev:latest
    command: celery -A app.worker.celery_app:celery_app worker --loglevel=info
    working_dir: /app/backend
    environment:
      ENV: dev
      DATABASE_URL: sqlite:///./data/qcp.db
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_NAME: qcp-default
      TASK_JOB_TIMEOUT_SECONDS: "90"
      EXECUTION_BACKEND: remote
      EXECUTION_SERVICE_URL: http://execution-service:8010
      EXECUTION_SERVICE_TIMEOUT_SECONDS: "10"
    volumes:
      - ./backend:/app/backend
      - sqlite-data:/app/backend/data
    depends_on:
      redis:
        condition: service_healthy
      execution-service:
        condition: service_started
    restart: unless-stopped

  execution-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qcp-backend-dev:latest
    command: uvicorn app.execution_service_app:execution_service_app --reload --host 0.0.0.0 --port 8010
    working_dir: /app/backend
    environment:
      ENV: dev
      EXECUTION_BACKEND: local
      EXECUTION_RUNNER_MODULE: app.services.execution.runner
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app/backend
    expose:
      - "8010"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev
    working_dir: /app/frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  sqlite-data:
  frontend-node-modules:
