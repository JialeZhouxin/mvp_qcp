services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qcp
      POSTGRES_USER: qcp
      POSTGRES_PASSWORD: QcpDev_2026_Strong!
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qcp -d qcp"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qcp-backend-dev:latest
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    working_dir: /app/backend
    environment:
      ENV: dev
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      DATABASE_URL: postgresql+psycopg://qcp:QcpDev_2026_Strong!@postgres:5432/qcp
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_NAME: qcp-default
      CIRCUIT_TASK_QUEUE_NAME: qcp-circuit
      TASK_JOB_TIMEOUT_SECONDS: "90"
      QIBO_EXEC_TIMEOUT_SECONDS: "60"
      CIRCUIT_EXEC_BACKEND: numpy
      CIRCUIT_EXEC_POOL_SIZE: "1"
      CIRCUIT_EXEC_INIT_TIMEOUT_SECONDS: "180"
      CIRCUIT_EXEC_TIMEOUT_SECONDS: "60"
      CIRCUIT_EXEC_HEARTBEAT_SECONDS: "10"
      CIRCUIT_EXEC_HEARTBEAT_TTL_SECONDS: "30"
      CIRCUIT_EXEC_HEARTBEAT_KEY: qcp:circuit:heartbeat
      EXECUTION_BACKEND: remote
      EXECUTION_SERVICE_URL: http://execution-service:8010
      EXECUTION_SERVICE_TIMEOUT_SECONDS: "75"
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app/backend
      - ../cc/mvp_qcp/backend/data:/migration-source:ro
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      execution-service:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qcp-backend-dev:latest
    command: celery -A app.worker.celery_app:celery_app worker --loglevel=info --queues=qcp-default
    working_dir: /app/backend
    environment:
      ENV: dev
      DATABASE_URL: postgresql+psycopg://qcp:QcpDev_2026_Strong!@postgres:5432/qcp
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_NAME: qcp-default
      CIRCUIT_TASK_QUEUE_NAME: qcp-circuit
      TASK_JOB_TIMEOUT_SECONDS: "90"
      QIBO_EXEC_TIMEOUT_SECONDS: "60"
      WORKER_ROLE: default
      EXECUTION_BACKEND: remote
      EXECUTION_SERVICE_URL: http://execution-service:8010
      EXECUTION_SERVICE_TIMEOUT_SECONDS: "75"
    volumes:
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      execution-service:
        condition: service_started
    restart: unless-stopped

  circuit-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qcp-backend-dev:latest
    command: celery -A app.worker.celery_app:celery_app worker --loglevel=info --pool=solo --concurrency=1 --queues=qcp-circuit
    working_dir: /app/backend
    environment:
      ENV: dev
      DATABASE_URL: postgresql+psycopg://qcp:QcpDev_2026_Strong!@postgres:5432/qcp
      REDIS_URL: redis://redis:6379/0
      TASK_QUEUE_NAME: qcp-default
      CIRCUIT_TASK_QUEUE_NAME: qcp-circuit
      TASK_JOB_TIMEOUT_SECONDS: "90"
      CIRCUIT_EXEC_BACKEND: numpy
      CIRCUIT_EXEC_POOL_SIZE: "1"
      CIRCUIT_EXEC_INIT_TIMEOUT_SECONDS: "180"
      CIRCUIT_EXEC_TIMEOUT_SECONDS: "60"
      CIRCUIT_EXEC_HEARTBEAT_SECONDS: "10"
      CIRCUIT_EXEC_HEARTBEAT_TTL_SECONDS: "30"
      CIRCUIT_EXEC_HEARTBEAT_KEY: qcp:circuit:heartbeat
      WORKER_ROLE: circuit
    volumes:
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  execution-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qcp-backend-dev:latest
    command: uvicorn app.execution_service_app:execution_service_app --reload --host 0.0.0.0 --port 8010
    working_dir: /app/backend
    environment:
      ENV: dev
      EXECUTION_BACKEND: docker
      EXECUTION_RUNNER_MODULE: app.services.execution.runner
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app/backend
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    expose:
      - "8010"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev
    working_dir: /app/frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  frontend-node-modules:
