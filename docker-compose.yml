services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    working_dir: /app/backend
    environment:
      ENV: dev
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      DATABASE_URL: sqlite:///./data/qcp.db
      REDIS_URL: redis://redis:6379/0
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app/backend
      - sqlite-data:/app/backend/data
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.worker.rq_worker
    working_dir: /app/backend
    environment:
      ENV: dev
      DATABASE_URL: sqlite:///./data/qcp.db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app/backend
      - sqlite-data:/app/backend/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev
    working_dir: /app/frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app/frontend
      - frontend-node-modules:/app/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  sqlite-data:
  frontend-node-modules:
